<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 700" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
    <style>
      .box { fill:#fff; stroke:#1f2937; stroke-width:2; rx:10; ry:10; }
      .group { fill:none; stroke:#1f2937; stroke-width:1.5; stroke-dasharray:6,4; rx:14; ry:14; }
      .lbl { fill:#1f2937; font-size:16px; }
      .lbl-sm { fill:#1f2937; font-size:13px; }
      .grp-lbl { fill:#1f2937; font-size:15px; font-weight:600; }
      .edge { stroke:#1f2937; stroke-width:2; fill:none; }
      .edge-lbl-bg { fill:#fff; }
      .edge-lbl { fill:#b91c1c; font-size:14px; font-weight:600; }
      .ns-lbl { fill:#6b7280; font-size:12px; font-style:italic; }
    </style>
  </defs>

  <!-- Internet -->
  <circle cx="80" cy="350" r="48" class="box"/>
  <text x="80" y="355" text-anchor="middle" class="lbl">Internet</text>

  <!-- POST arrow -->
  <line x1="128" y1="350" x2="232" y2="350" class="edge" marker-end="url(#arrow)"/>
  <text x="180" y="338" text-anchor="middle" class="edge-lbl">POST</text>

  <!-- Web Tier group -->
  <rect x="240" y="220" width="320" height="260" class="group"/>
  <text x="400" y="250" text-anchor="middle" class="grp-lbl">web Tier</text>
  <text x="400" y="267" text-anchor="middle" class="ns-lbl">namespace: web-tier</text>

  <!-- Load Balancer -->
  <rect x="265" y="320" width="120" height="60" class="box"/>
  <text x="325" y="346" text-anchor="middle" class="lbl">Load</text>
  <text x="325" y="364" text-anchor="middle" class="lbl">Balancer</text>

  <!-- LB -> Envoy -->
  <line x1="385" y1="350" x2="415" y2="350" class="edge" marker-end="url(#arrow)"/>

  <!-- Envoy proxy -->
  <rect x="415" y="320" width="120" height="60" class="box"/>
  <text x="475" y="356" text-anchor="middle" class="lbl">envoy proxy</text>

  <!-- /premium edge with label background -->
  <path d="M535,335 C 620,275 700,200 770,200" class="edge" marker-end="url(#arrow)"/>
  <rect x="565" y="245" width="80" height="22" class="edge-lbl-bg"/>
  <text x="605" y="261" text-anchor="middle" class="edge-lbl">/premium</text>

  <!-- /free edge with label background -->
  <path d="M535,365 C 620,425 700,500 770,500" class="edge" marker-end="url(#arrow)"/>
  <rect x="580" y="450" width="50" height="22" class="edge-lbl-bg"/>
  <text x="605" y="466" text-anchor="middle" class="edge-lbl">/free</text>

  <!-- Service Tier outer group -->
  <rect x="600" y="40" width="620" height="640" class="group"/>
  <text x="910" y="70" text-anchor="middle" class="grp-lbl">service Tier</text>

  <!-- Premium service group -->
  <rect x="630" y="100" width="380" height="220" class="group"/>
  <text x="820" y="130" text-anchor="middle" class="grp-lbl">premium service</text>
  <text x="820" y="147" text-anchor="middle" class="ns-lbl">namespace: premium-service</text>

  <!-- Premium envoy -->
  <rect x="660" y="170" width="130" height="60" class="box"/>
  <text x="725" y="206" text-anchor="middle" class="lbl">envoy proxy</text>

  <!-- Premium envoy -> flask -->
  <line x1="790" y1="200" x2="830" y2="200" class="edge" marker-end="url(#arrow)"/>

  <!-- Premium flask app -->
  <rect x="830" y="170" width="130" height="60" class="box"/>
  <text x="895" y="198" text-anchor="middle" class="lbl">flask</text>
  <text x="895" y="216" text-anchor="middle" class="lbl">app</text>

  <!-- Premium flask -> job -->
  <line x1="960" y1="200" x2="1080" y2="200" class="edge" marker-end="url(#arrow)"/>

  <!-- Premium job (diamond) -->
  <polygon points="1080,200 1140,155 1200,200 1140,245" class="box"/>
  <text x="1140" y="192" text-anchor="middle" class="lbl-sm">premium</text>
  <text x="1140" y="208" text-anchor="middle" class="lbl-sm">job</text>
  <text x="1140" y="224" text-anchor="middle" class="lbl-sm">(kmnist)</text>

  <!-- Free service group -->
  <rect x="630" y="400" width="380" height="220" class="group"/>
  <text x="820" y="430" text-anchor="middle" class="grp-lbl">free service</text>
  <text x="820" y="447" text-anchor="middle" class="ns-lbl">namespace: free-service</text>

  <!-- Free envoy -->
  <rect x="660" y="470" width="130" height="60" class="box"/>
  <text x="725" y="506" text-anchor="middle" class="lbl">envoy proxy</text>

  <!-- Free envoy -> flask -->
  <line x1="790" y1="500" x2="830" y2="500" class="edge" marker-end="url(#arrow)"/>

  <!-- Free flask app -->
  <rect x="830" y="470" width="130" height="60" class="box"/>
  <text x="895" y="498" text-anchor="middle" class="lbl">flask</text>
  <text x="895" y="516" text-anchor="middle" class="lbl">app</text>

  <!-- Free flask -> job -->
  <line x1="960" y1="500" x2="1080" y2="500" class="edge" marker-end="url(#arrow)"/>

  <!-- Free job (diamond) -->
  <polygon points="1080,500 1140,455 1200,500 1140,545" class="box"/>
  <text x="1140" y="492" text-anchor="middle" class="lbl-sm">free</text>
  <text x="1140" y="508" text-anchor="middle" class="lbl-sm">job</text>
  <text x="1140" y="524" text-anchor="middle" class="lbl-sm">(mnist)</text>
</svg>
