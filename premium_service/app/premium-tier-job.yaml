#
# This YAML defines a template for launching a batch job in the 'premium-service' namespace.
# The job runs a container that performs a classification task.
#
# TODO: Fill in the Kubernetes Job spec here.
apiVersion: batch/v1
kind: Job
metadata:
  name: premium-job-template
  namespace: premium-service
spec:
  template:
    spec:
      containers:
      - name: premium-tier-job
        image: mohassan99/premium-tier-job:latest
        env:
        - name: DATASET
          value: "kmnist"
        - name: TYPE
          value: "cnn"
      restartPolicy: Never
  backoffLimit: 0
