apiVersion: batch/v1
kind: Job
metadata:
  name: JOB_NAME
  namespace: premium-service
spec:
  template:
    spec:
      containers:
      - name: premium-tier-job
        image: mohassan99/premium-tier-job:latest
        env:
        - name: DATASET
          value: "kmnist"
        - name: TYPE
          value: "cnn"
      restartPolicy: Never
  backoffLimit: 0
