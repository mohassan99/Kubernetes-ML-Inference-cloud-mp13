#
# This YAML defines a template for launching a batch job in the 'free-service' namespace.
# The job runs a container that performs a classification task.
#
# TODO: Fill in the Kubernetes Job spec here.
apiVersion: batch/v1
kind: Job
metadata:
  name: free-job-template
  namespace: free-service
spec:
  template:
    spec:
      containers:
      - name: free-tier-job
        image: mohassan99/free-tier-job:latest
        env:
        - name: DATASET
          value: "mnist"
        - name: TYPE
          value: "ff"
        resources:
          requests:
            cpu: "500m"
          limits:
            cpu: "500m"
      restartPolicy: Never
  backoffLimit: 0
