# Starter Envoy proxy configuration for the Web Tier service.
#
# This YAML configures Envoy to route HTTP requests to the Free and Premium services.
# Students may use this as a base for adding routing, filters, or other proxy features as needed.
#
# TODO: Fill in the Envoy proxy configuration here.
static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          route_config:
            name: local_route
            virtual_hosts:
            - name: local_service
              domains: ["*"]
              routes:
              - match:
                  prefix: "/free"
                route:
                  cluster: free_service
              - match:
                  prefix: "/premium"
                route:
                  cluster: premium_service
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
  - name: free_service
    connect_timeout: 0.25s
    type: STRICT_DNS
    load_assignment:
      cluster_name: free_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: free-tier-service.free-service.svc.cluster.local
                port_value: 5000
  - name: premium_service
    connect_timeout: 0.25s
    type: STRICT_DNS
    load_assignment:
      cluster_name: premium_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: premium-tier-service.premium-service.svc.cluster.local
                port_value: 5000
